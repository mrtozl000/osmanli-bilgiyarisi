name: OsmanliBilgiYarisi
options:
  bundleIdPrefix: com.osmanli
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Using the explicit Info.plist in Sources/ so we can add custom keys
    # (REVENUECAT_API_KEY, API_BASE_URL) that INFOPLIST_KEY_* build settings can't express.
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Sources/Info.plist
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0

targets:
  OsmanliBilgiYarisi:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
    entitlements:
      path: Sources/OsmanliBilgiYarisi.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        # All UI / bundle keys now live in Sources/Info.plist (see INFOPLIST_FILE above).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_BUNDLE_IDENTIFIER: com.osmanli.bilgiyarisi
        CODE_SIGN_ENTITLEMENTS: Sources/OsmanliBilgiYarisi.entitlements
